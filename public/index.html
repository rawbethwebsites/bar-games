<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Bar Games</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <section id="home" class="screen active">
      <div class="hero">
        <div class="seal">⚖</div>
        <h1>The Bar Games</h1>
        <p class="subtitle">Five law-flavoured party games for two players</p>
      </div>
      <div class="mode-select">
        <button class="mode-btn primary" data-mode="same-screen">
          <span class="icon">⌨</span>
          <span>Same Screen</span>
          <small>Always works, no WiFi needed</small>
        </button>
        <button class="mode-btn" data-mode="phone">
          <span class="icon">📱</span>
          <span>Use Our Phones</span>
          <small>Scan a QR code to join</small>
        </button>
      </div>
    </section>

    <section id="lobby" class="screen">
      <div class="header">
        <button class="back">← Back</button>
        <h2>Choose a Game</h2>
        <div class="score-bar"><span class="red">0</span><span class="vs">vs</span><span class="blue">0</span></div>
      </div>
      <div class="game-grid">
        <button class="game-card" data-game="guilty">
          <span class="game-icon">⚖</span>
          <h3>Guilty or Not Guilty</h3>
          <p>Real lawsuit, or fake?</p>
        </button>
        <button class="game-card" data-game="objection">
          <span class="game-icon">🗣</span>
          <h3>Objection!</h3>
          <p>Fastest buzzer wins.</p>
        </button>
        <button class="game-card" data-game="sustained">
          <span class="game-icon">❓</span>
          <h3>Sustained</h3>
          <p>Trivia sprint.</p>
        </button>
        <button class="game-card" data-game="order">
          <span class="game-icon">🤣</span>
          <h3>Order in the Court</h3>
          <p>Funniest line wins.</p>
        </button>
        <button class="game-card" data-game="gavel">
          <span class="game-icon">🔨</span>
          <h3>Beat the Gavel</h3>
          <p>Stop the verdict meter.</p>
        </button>
        <button class="game-card tournament" data-game="tournament">
          <span class="game-icon">🏆</span>
          <h3>Tournament</h3>
          <p>Play all five. Crown the Silk.</p>
        </button>
      </div>
    </section>

    <section id="game" class="screen">
      <div class="game-ui">
        <div class="score-bar top">
          <div class="left-score"><span class="label">Prosecution</span><span class="score red">0</span></div>
          <div class="vs">VS</div>
          <div class="right-score"><span class="score blue">0</span><span class="label">Defence</span></div>
        </div>
        <div id="game-stage"></div>
        <div class="controls-hint">
          <span><b>Left:</b> A = Real, S = Fake</span>
          <span><b>Right:</b> L = Real, K = Fake</span>
        </div>
      </div>
    </section>

    <section id="phone-lobby" class="screen">
      <div class="hero">
        <h1>Phone Mode</h1>
        <p class="subtitle">Scan the QR code to join</p>
      </div>
      <div id="qr-container"></div>
      <div id="room-code" class="room-code"></div>
      <div id="players-joined" class="players-joined"></div>
      <div class="mode-select">
        <button class="mode-btn primary" id="start-game-btn" disabled>Waiting for players…</button>
        <button class="mode-btn back">Back</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="games/guilty.js"></script>
  <script src="host.js"></script>
</body>
</html>
