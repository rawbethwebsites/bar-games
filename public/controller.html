<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bar Games Controller</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c15;
      --panel: #151725;
      --neon-red: #ff2a6d;
      --neon-blue: #05d9e8;
      --neon-gold: #ffd300;
      --text: #f0f0f0;
      --muted: #7a7d9c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,42,109,0.12), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(5,217,232,0.12), transparent 40%);
      pointer-events: none;
    }
    #join-panel, #game-panel { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 420px; }
    #game-panel { display: none; width: 100%; height: 100vh; position: fixed; inset: 0; max-width: none; }
    .card {
      background: var(--panel);
      border-radius: 24px;
      padding: 2.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 50px rgba(255,42,109,0.08);
    }
    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: var(--neon-gold);
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      padding: 1rem;
      border-radius: 12px;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .side-select { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .side-btn {
      flex: 1;
      padding: 1rem;
      border-radius: 12px;
      border: 2px solid;
      background: transparent;
      color: var(--text);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .side-btn.red { border-color: var(--neon-red); }
    .side-btn.blue { border-color: var(--neon-blue); }
    .side-btn.red.selected { background: var(--neon-red); color: #000; }
    .side-btn.blue.selected { background: var(--neon-blue); color: #000; }
    .join-btn {
      width: 100%;
      padding: 1.2rem;
      border-radius: 12px;
      border: none;
      background: var(--neon-gold);
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .join-btn:hover { filter: brightness(1.15); }
    .buzzer {
      width: 100%;
      height: 48vh;
      border-radius: 24px;
      border: none;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.5rem, 8vw, 2.5rem);
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .buzzer:active { transform: scale(0.97); }
    .buzzer.real { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px rgba(5,217,232,0.35); margin-bottom: 2vh; }
    .buzzer.fake { background: var(--neon-red); color: #000; box-shadow: 0 0 30px rgba(255,42,109,0.35); }
    #status {
      position: fixed;
      top: 1rem;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="status"></div>

  <div id="join-panel">
    <div class="card">
      <h2>JOIN GAME</h2>
      <input id="room-input" placeholder="ROOM" maxlength="5" />
      <div class="side-select">
        <button class="side-btn red" data-side="red">PROSECUTION</button>
        <button class="side-btn blue" data-side="blue">DEFENCE</button>
      </div>
      <button class="join-btn" id="join-btn">ENTER COURT</button>
    </div>
  </div>

  <div id="game-panel">
    <button class="buzzer real" data-action="real">REAL</button>
    <button class="buzzer fake" data-action="fake">FAKE</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    let socket = null;
    let side = null;
    let room = null;

    const params = new URLSearchParams(window.location.search);
    const prefilledRoom = params.get('room');
    if (prefilledRoom) document.getElementById('room-input').value = prefilledRoom;

    document.querySelectorAll('.side-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        side = btn.dataset.side;
      });
    });

    document.getElementById('join-btn').addEventListener('click', () => {
      room = document.getElementById('room-input').value.toUpperCase();
      if (!room || !side) return alert('Enter room code and pick a side.');
      socket = io();
      socket.emit('join-room', { code: room, side }, (res) => {
        if (!res.ok) return alert(res.error);
        document.getElementById('join-panel').style.display = 'none';
        document.getElementById('game-panel').style.display = 'flex';
        document.getElementById('status').textContent = `Connected as ${side.toUpperCase()}. Tap to answer.`;
      });
    });

    document.querySelectorAll('.buzzer').forEach(btn => {
      const send = (e) => {
        e.preventDefault();
        if (!socket || !room) return;
        socket.emit('player-action', { action: btn.dataset.action, side });
      };
      btn.addEventListener('touchstart', send, { passive: false });
      btn.addEventListener('mousedown', send);
    });
  </script>
</body>
</html>
