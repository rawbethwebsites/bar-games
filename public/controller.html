<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bar Games Controller</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--bg); color: var(--parchment); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 2rem; }
    #join-panel, #game-panel { text-align: center; }
    #game-panel { display: none; width: 100%; height: 100%; }
    .buzzer { width: 100%; height: 45vh; border-radius: 1.5rem; border: none; font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
    .buzzer.real { background: var(--blue); color: white; }
    .buzzer.fake { background: var(--red); color: white; }
    .buzzer:active { transform: scale(0.98); }
    input { background: rgba(244,233,214,0.1); border: 1px solid var(--gold); color: var(--parchment); padding: 1rem; border-radius: 0.5rem; font-size: 1.5rem; text-align: center; margin-bottom: 1rem; width: 200px; text-transform: uppercase; }
    .side-select { display: flex; gap: 1rem; margin: 1rem 0; }
    .side-btn { flex: 1; padding: 1rem; border-radius: 1rem; border: 2px solid; background: transparent; color: var(--parchment); font-weight: 800; }
    .side-btn.red { border-color: var(--red); }
    .side-btn.blue { border-color: var(--blue); }
    .side-btn.selected { background: var(--parchment); color: var(--bg); }
  </style>
</head>
<body>
  <div id="join-panel">
    <h2>Join Game</h2>
    <input id="room-input" placeholder="ROOM" maxlength="5" />
    <div class="side-select">
      <button class="side-btn red" data-side="red">Prosecution</button>
      <button class="side-btn blue" data-side="blue">Defence</button>
    </div>
    <button class="mode-btn primary" id="join-btn">Join</button>
  </div>

  <div id="game-panel">
    <div id="status">Connected. Wait for the host.</div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    let socket = null;
    let side = null;
    let room = null;

    const params = new URLSearchParams(window.location.search);
    const prefilledRoom = params.get('room');
    if (prefilledRoom) document.getElementById('room-input').value = prefilledRoom;

    document.querySelectorAll('.side-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        side = btn.dataset.side;
      });
    });

    document.getElementById('join-btn').addEventListener('click', () => {
      room = document.getElementById('room-input').value.toUpperCase();
      if (!room || !side) return alert('Enter room code and pick a side.');
      socket = io();
      socket.emit('join-room', { code: room, side }, (res) => {
        if (!res.ok) return alert(res.error);
        document.getElementById('join-panel').style.display = 'none';
        document.getElementById('game-panel').style.display = 'flex';
        renderGuiltyControls();
      });
    });

    function renderGuiltyControls() {
      const panel = document.getElementById('game-panel');
      panel.innerHTML = `
        <button class="buzzer real" data-action="real">REAL LAWSUIT</button>
        <button class="buzzer fake" data-action="fake">FAKE LAWSUIT</button>
      `;
      panel.querySelectorAll('.buzzer').forEach(btn => {
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); sendAction(btn.dataset.action); }, {passive:false});
        btn.addEventListener('mousedown', (e) => { e.preventDefault(); sendAction(btn.dataset.action); });
      });
    }

    function sendAction(action) {
      if (!socket || !room) return;
      socket.emit('player-action', { action, side });
    }
  </script>
</body>
</html>
