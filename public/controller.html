<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bar Games Controller</title>
  <link rel="icon" type="image/png" href="/favicon-1.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c15;
      --panel: #151725;
      --neon-red: #ff2a6d;
      --neon-blue: #05d9e8;
      --neon-gold: #ffd300;
      --text: #f0f0f0;
      --muted: #7a7d9c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,42,109,0.12), transparent 40%),
        radial-gradient(circle at 70% 70%, rgba(5,217,232,0.12), transparent 40%);
      pointer-events: none;
    }
    #join-panel, #game-panel { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 420px; }
    #game-panel { display: none; width: 100%; height: 100vh; position: fixed; inset: 0; max-width: none; }
    .card {
      background: var(--panel);
      border-radius: 24px;
      padding: 2.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 50px rgba(255,42,109,0.08);
    }
    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: var(--neon-gold);
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      padding: 1rem;
      border-radius: 12px;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .side-select { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .side-btn {
      flex: 1;
      padding: 1rem;
      border-radius: 12px;
      border: 2px solid;
      background: transparent;
      color: var(--text);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .side-btn.red { border-color: var(--neon-red); }
    .side-btn.blue { border-color: var(--neon-blue); }
    .side-btn.red.selected { background: var(--neon-red); color: #000; }
    .side-btn.blue.selected { background: var(--neon-blue); color: #000; }
    .join-btn {
      width: 100%;
      padding: 1.2rem;
      border-radius: 12px;
      border: none;
      background: var(--neon-gold);
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .join-btn:hover { filter: brightness(1.15); }
    .buzzer {
      width: 100%;
      height: 48vh;
      border-radius: 24px;
      border: none;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.5rem, 8vw, 2.5rem);
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .buzzer:active { transform: scale(0.97); }
    .buzzer.real { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px rgba(5,217,232,0.35); margin-bottom: 2vh; }
    .buzzer.fake { background: var(--neon-red); color: #000; box-shadow: 0 0 30px rgba(255,42,109,0.35); }
    /* adaptive layouts */
    #game-panel { flex-direction: column; padding: 1.2rem; gap: 1.2rem; }
    #game-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; letter-spacing: 0.06em; color: var(--neon-gold); text-align: center; margin-top: 2.4rem; }
    #pad { flex: 1; display: flex; flex-direction: column; gap: 1.2rem; width: 100%; }
    .buzz-single { flex: 1; border: none; border-radius: 24px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(2rem, 12vw, 3.5rem); letter-spacing: 0.05em; color: #000; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: transform 0.08s; }
    .buzz-single:active { transform: scale(0.97); }
    .buzz-single.red { background: var(--neon-red); box-shadow: 0 0 40px rgba(255,42,109,0.4); }
    .buzz-single.blue { background: var(--neon-blue); box-shadow: 0 0 40px rgba(5,217,232,0.4); }
    .pad-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 1rem; width: 100%; }
    .pad-btn { border: none; border-radius: 20px; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(2rem, 10vw, 3rem); color: #000; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: transform 0.08s; background: var(--neon-gold); }
    .pad-btn:active { transform: scale(0.95); }
    .pad-btn.red { background: var(--neon-red); }
    .pad-btn.blue { background: var(--neon-blue); }
    .pad-arrow-grid { flex: 1; display: flex; flex-direction: column; gap: 1rem; width: 100%; }
    .pad-arrow-row { flex: 1; display: flex; gap: 1rem; }
    .wait-msg { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; color: var(--muted); font-size: 1.1rem; padding: 2rem; }
    .flash { animation: flash 0.25s; }
    @keyframes flash { from { filter: brightness(1.6); } to { filter: brightness(1); } }
    #status {
      position: fixed;
      top: 1rem;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      z-index: 2;
    }
    #connecting { text-align: center; color: var(--muted); font-size: 1rem; z-index: 1; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--neon-gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #err-msg { color: var(--neon-red); font-size: 0.9rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div id="status"></div>

  <div id="join-panel">
    <div class="card">
      <img src="tbn-logo.png" alt="The Boost Nation" style="width:60px;height:60px;border-radius:12px;margin-bottom:1rem;" />
      <h2>JOIN GAME</h2>
      <input id="room-input" placeholder="ROOM" />
      <div class="side-select">
        <button class="side-btn red" data-side="red">PROSECUTION</button>
        <button class="side-btn blue" data-side="blue">DEFENCE</button>
      </div>
      <button class="join-btn" id="join-btn">ENTER COURT</button>
      <div id="err-msg"></div>
    </div>
  </div>

  <div id="connecting" style="display:none;">
    <div class="spinner"></div>
    <p>Connecting to host…</p>
  </div>

  <div style="position:fixed;bottom:0;left:0;right:0;text-align:center;padding:0.5rem;font-size:0.7rem;color:var(--muted);z-index:2;">
    Courtesy of Bar Mary · Powered by <a href="https://theboostnation.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;"><strong style="color:var(--neon-gold);">The Boost Nation</strong></a>
  </div>

  <div id="game-panel">
    <div id="game-title">Waiting for the game…</div>
    <div id="pad"><div class="wait-msg">Waiting for the host to start a game…</div></div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="/sfx.js"></script>
  <script src="/favicon-blink.js"></script>
  <script>
    let conn = null;
    let side = null;
    let room = null;

    const params = new URLSearchParams(window.location.search);
    const prefilledRoom = params.get('room');
    if (prefilledRoom) document.getElementById('room-input').value = prefilledRoom;

    document.querySelectorAll('.side-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        side = btn.dataset.side;
      });
    });

    function send(action) {
      if (!conn || !conn.open) return;
      conn.send({ type: 'player-action', action, side });
      if (navigator.vibrate) navigator.vibrate(30);
      if (window.SFX) SFX.click();
    }

    // Build the control layout for the active game.
    function renderControls(scheme, title) {
      const pad = document.getElementById('pad');
      document.getElementById('game-title').textContent = title || 'Get ready…';
      pad.innerHTML = '';

      const mkBtn = (label, action, cls, node) => {
        const b = document.createElement('button');
        b.className = cls; b.textContent = label;
        const fire = (e) => { e.preventDefault(); b.classList.remove('flash'); void b.offsetWidth; b.classList.add('flash'); send(action); };
        b.addEventListener('touchstart', fire, { passive: false });
        b.addEventListener('mousedown', fire);
        node.appendChild(b);
      };

      if (scheme === 'buzz') {
        mkBtn('BUZZ', 'buzz', 'buzz-single ' + side, pad);
      } else if (scheme === 'abcd' || scheme === 'burden') {
        const grid = document.createElement('div'); grid.className = 'pad-grid'; pad.appendChild(grid);
        ['1', '2', '3', '4'].forEach(l => mkBtn(l, String.fromCharCode(97 + parseInt(l) - 1), 'pad-btn ' + side, grid));
      } else if (scheme === 'xref') {
        mkBtn('SUPPORTED', 'a', 'buzz-single blue', pad);
        mkBtn('CONTRADICTED', 'b', 'buzz-single red', pad);
        mkBtn('NOT MENTIONED', 'c', 'buzz-single ' + side, pad);
      } else if (scheme === 'yesno' || scheme === 'freedetain' || scheme === 'sustainoverrule' || scheme === 'complyobject') {
        // Two-button scheme
        const labels = scheme === 'yesno' ? ['YES', 'NO']
                     : scheme === 'freedetain' ? ['FREE', 'DETAIn']
                     : scheme === 'complyobject' ? ['COMPLY', 'OBJECT']
                     : ['SUSTAIN', 'OVERRULE'];
        mkBtn(labels[0], 'a', 'buzz-single blue', pad);
        mkBtn(labels[1], 'b', 'buzz-single red', pad);
      } else if (scheme === 'cycle') {
        // Voir Dire: up/down cycle + lock button
        const wrap = document.createElement('div'); wrap.className = 'pad-arrow-grid'; pad.appendChild(wrap);
        const row = document.createElement('div'); row.className = 'pad-arrow-row'; wrap.appendChild(row);
        mkBtn('▲', 'up', 'buzz-single ' + side, row);
        mkBtn('▼', 'down', 'buzz-single ' + side, row);
        mkBtn('LOCK', 'buzz', 'buzz-single ' + side, wrap);
      } else { // realfake (default)
        mkBtn('REAL', 'real', 'buzz-single blue', pad);
        mkBtn('FAKE', 'fake', 'buzz-single red', pad);
      }
    }

    document.getElementById('join-btn').addEventListener('click', () => {
      room = document.getElementById('room-input').value;
      if (!room || !side) { document.getElementById('err-msg').textContent = 'Enter room code and pick a side.'; return; }
      document.getElementById('err-msg').textContent = '';
      document.getElementById('join-panel').style.display = 'none';
      document.getElementById('connecting').style.display = 'block';

      // If the room value is short (5 chars, the room code), prepend the prefix
      // If it's long (full peer ID from QR code), use as-is
      const hostId = room.length <= 5 ? 'bar-games-' + room.toUpperCase() : room;

      let peer = null;
      let joined = false;
      let retryTimer = null;
      let pollTimer = null;

      function connectToHost() {
        peer = new Peer();

        peer.on('open', () => {
          conn = peer.connect(hostId, { reliable: true });

          // Retry sending join every 500ms until host confirms.
          // Only send when conn.open is true — calling send() before
          // the connection is open throws an error.
          function sendJoin() {
            if (!joined && conn && conn.open) {
              conn.send({ type: 'join', side });
            }
          }

          conn.on('open', () => {
            // Connection is ready — start retrying the join message
            sendJoin();
            retryTimer = setInterval(sendJoin, 500);
          });

          conn.on('data', (payload) => {
            if (payload && payload.type === 'joined') {
              // Host confirmed our join
              joined = true;
              if (retryTimer) clearInterval(retryTimer);
              document.getElementById('connecting').style.display = 'none';
              document.getElementById('game-panel').style.display = 'flex';
              document.getElementById('status').textContent = `Connected as ${side === 'red' ? 'PROSECUTION' : 'DEFENCE'}`;
              // Start polling for controls as a backup to push
              pollTimer = setInterval(() => {
                if (conn && conn.open) conn.send({ type: 'get-controls' });
              }, 2000);
            } else if (payload && payload.type === 'error') {
              if (retryTimer) clearInterval(retryTimer);
              document.getElementById('connecting').style.display = 'none';
              document.getElementById('join-panel').style.display = 'block';
              document.getElementById('err-msg').textContent = payload.error || 'Could not join.';
            } else if (payload && payload.type === 'controls') {
              renderControls(payload.scheme, payload.title);
            }
          });

          // Timeout: if no response in 8s, show error
          setTimeout(() => {
            if (!joined) {
              if (retryTimer) clearInterval(retryTimer);
              document.getElementById('connecting').style.display = 'none';
              document.getElementById('join-panel').style.display = 'block';
              document.getElementById('err-msg').textContent = 'Could not reach host. Check the room code.';
            }
          }, 8000);

          conn.on('close', () => {
            if (retryTimer) clearInterval(retryTimer);
            if (pollTimer) clearInterval(pollTimer);
            document.getElementById('game-panel').style.display = 'none';
            document.getElementById('join-panel').style.display = 'block';
            document.getElementById('err-msg').textContent = 'Host disconnected.';
            document.getElementById('connecting').style.display = 'none';
          });

          conn.on('error', () => {
            if (retryTimer) clearInterval(retryTimer);
            if (pollTimer) clearInterval(pollTimer);
            document.getElementById('connecting').style.display = 'none';
            document.getElementById('join-panel').style.display = 'block';
            document.getElementById('err-msg').textContent = 'Connection failed. Try again.';
          });
        });

        peer.on('error', (err) => {
          if (retryTimer) clearInterval(retryTimer);
          document.getElementById('connecting').style.display = 'none';
          document.getElementById('join-panel').style.display = 'block';
          document.getElementById('err-msg').textContent = 'Connection error: ' + (err.type || 'unknown');
        });
      }

      connectToHost();
    });
  </script>
</body>
</html>
