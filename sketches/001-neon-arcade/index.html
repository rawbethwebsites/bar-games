<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variant: Neon Arcade — The Bar Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c15;
      --panel: #151725;
      --neon-red: #ff2a6d;
      --neon-blue: #05d9e8;
      --neon-gold: #ffd300;
      --text: #f0f0f0;
      --muted: #7a7d9c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,42,109,0.12), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(5,217,232,0.12), transparent 40%);
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 1;
      width: min(900px, 95vw);
      background: var(--panel);
      border-radius: 28px;
      padding: 3rem;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 60px rgba(255,42,109,0.08), 0 0 100px rgba(5,217,232,0.05);
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.2rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, var(--neon-red), var(--neon-gold), var(--neon-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align: center; color: var(--muted); font-size: 1.1rem; margin-bottom: 3rem; }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .option {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .option::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .option:first-child::before { background: radial-gradient(circle, rgba(255,42,109,0.15), transparent 70%); }
    .option:last-child::before { background: radial-gradient(circle, rgba(5,217,232,0.15), transparent 70%); }
    .option:hover::before { opacity: 1; }
    .option:hover { border-color: rgba(255,255,255,0.25); transform: translateY(-3px); }
    .option .icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
    .option h3 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .option p { color: var(--muted); font-size: 0.9rem; }
    @media (max-width: 640px) {
      .options { grid-template-columns: 1fr; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>The Bar Games</h1>
    <p class="subtitle">Five law-flavoured party games for two players</p>

    <div class="options">
      <div class="option" onclick="alert('Same screen mode')">
        <span class="icon">🕹</span>
        <h3>Same Screen</h3>
        <p>Always works. No WiFi needed.</p>
      </div>
      <div class="option" onclick="alert('Phone mode')">
        <span class="icon">📲</span>
        <h3>Use Our Phones</h3>
        <p>Scan a QR code to join.</p>
      </div>
    </div>
  </div>
  <p style="position:relative;z-index:1;margin-top:1.5rem;color:var(--muted);font-size:0.8rem;">Variant 2: Neon Arcade — arcade glow, neon red/blue, futuristic game feel.</p>
</body>
</html>
